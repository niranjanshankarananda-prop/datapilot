<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DataPilot{% endblock %}</title>

    <!-- Tailwind CSS v3 Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'ui-monospace', 'monospace'],
                    },
                    colors: {
                        surface: {
                            DEFAULT: '#0f1117',
                            50: '#1a1d2e',
                            100: '#161927',
                            200: '#1e2235',
                            300: '#252a3e',
                            400: '#2d3348',
                        },
                        accent: {
                            DEFAULT: '#6366f1',
                            light: '#818cf8',
                            dark: '#4f46e5',
                            glow: 'rgba(99, 102, 241, 0.15)',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'slide-down': 'slideDown 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(12px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                },
            },
        }
    </script>

    <!-- Google Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

    <!-- Legacy CSS for HTMX indicators -->
    <link rel="stylesheet" href="/static/css/output.css">

    <style>
        /* Base resets and custom styles */
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Glassmorphism card */
        .glass-card {
            background: rgba(30, 34, 53, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* Gradient border effect */
        .gradient-border {
            position: relative;
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(99,102,241,0.4), rgba(139,92,246,0.2), rgba(6,182,212,0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Subtle noise texture overlay */
        .noise-bg::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* HTMX loading indicator refinements */
        .htmx-indicator { opacity: 0; transition: opacity 300ms ease-in; }
        .htmx-indicator.htmx-request { opacity: 1; }
        .htmx-request .htmx-indicator { opacity: 1; }

        /* Plotly chart dark theme overrides */
        .chart-container .plotly .modebar { background: transparent !important; }
        .chart-container .plotly .modebar-btn path { fill: rgba(255,255,255,0.5) !important; }
        .chart-container .plotly .modebar-btn:hover path { fill: rgba(99,102,241,0.9) !important; }

        /* Smooth hover transitions for interactive elements */
        .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hover-lift:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }

        /* Subtle gradient background */
        .bg-gradient-animated {
            background: linear-gradient(-45deg, #0f1117, #1a1040, #0f1117, #101a2e);
            background-size: 400% 400%;
            background-position: 0% 50%;
        }

        /* Shimmer Loading Effect */
        .shimmer {
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-surface text-gray-200 min-h-screen noise-bg bg-gradient-animated font-sans">
    <div class="relative z-10">
        {% block content %}{% endblock %}
    </div>

    <script src="/static/js/plotly-config.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
